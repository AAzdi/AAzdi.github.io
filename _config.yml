# Site Settings
title: "Di Zhang"
description: "Personal Homepage of Di Zhang"
url: "https://AAzdi.github.io"
baseurl: ""

# Theme
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "default"

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-feed

# Author (shown in sidebar)
author:
  name: "Di Zhang"
  avatar: "/photo.jpg"
  bio: "M.S. Student at Peking University"
  location: "Beijing, China"
  email: "zhangdi@stu.pku.edu.cn"
  links:
    - label: "Google Scholar"
      icon: "fas fa-graduation-cap"
      url: "https://scholar.google.com/citations?user=6GxOG6sAAAAJ&hl=en"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/AAzdi"

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "single"
      author_profile: true
